<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Splitter</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
      text-align: center;
      width: 350px;
      animation: fadeIn 0.8s ease-in-out;
    }

    h2 {
      margin-bottom: 20px;
      color: #1e3c72;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #007BFF;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(135deg, #007BFF, #0056b3);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .note {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>PDF Splitter</h2>

    <input type="file" id="pdfFile" accept="application/pdf">

    <input type="number" id="startPage" placeholder="Start page (e.g. 1)">
    <input type="number" id="endPage" placeholder="End page (e.g. 5)">

    <button onclick="splitPDF()">Split PDF</button>

    <div class="note">Enter page range like 1 to 5</div>
  </div>

  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

  <script>
    async function splitPDF() {
      const fileInput = document.getElementById('pdfFile');
      const startPage = parseInt(document.getElementById('startPage').value);
      const endPage = parseInt(document.getElementById('endPage').value);

      if (!fileInput.files[0]) {
        alert("Please upload a PDF");
        return;
      }

      if (!startPage || !endPage || startPage > endPage) {
        alert("Enter a valid page range");
        return;
      }

      const file = fileInput.files[0];
      const arrayBuffer = await file.arrayBuffer();

      const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
      const totalPages = pdfDoc.getPageCount();

      if (endPage > totalPages) {
        alert("End page exceeds total pages (" + totalPages + ")");
        return;
      }

      const newPdf = await PDFLib.PDFDocument.create();

      const pageIndexes = [];
      for (let i = startPage - 1; i < endPage; i++) {
        pageIndexes.push(i);
      }

      const pages = await newPdf.copyPages(pdfDoc, pageIndexes);
      pages.forEach((page) => newPdf.addPage(page));

      const pdfBytes = await newPdf.save();

      const blob = new Blob([pdfBytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = `pages_${startPage}_to_${endPage}.pdf`;
      a.click();
    }
  </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .projects-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            margin-bottom: 10px;
            color: #1e3c72;
        }

        .card p {
            font-size: 14px;
            color: #555;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            text-decoration: none;
            color: white;
            background: linear-gradient(135deg, #007BFF, #0056b3);
            border-radius: 20px;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Back button */
        .back {
            display: block;
            text-align: center;
            margin-bottom: 30px;
        }

        .back a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .back a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="back">
        <a href="index.html">← Back to Home</a>
    </div>

    <h1>My Projects</h1>

    <div class="projects-container">

        <!-- Project 1 -->
        <div class="card">
            <h3>PDF Splitter App</h3>
            <p>Split PDF files by page range directly in browser.</p>
            <a class="btn" href="https://luckyrajwani.github.io/resume-website/splitpdf.html" target="_blank">View Project</a>
        </div>

        <!-- Project 2 -->
        <div class="card">
            <h3>To-Do List</h3>
            <p>Simple task manager built using HTML, CSS, and JavaScript.</p>
            <a class="btn" href="YOUR_PROJECT_LINK" target="_blank">View Project</a>
        </div>

        <!-- Project 3 -->
        <div class="card">
            <h3>Portfolio Website</h3>
            <p>Personal website to showcase my work and experience.</p>
            <a class="btn" href="YOUR_PROJECT_LINK" target="_blank">View Project</a>
        </div>

    </div>

</body>

</html>
